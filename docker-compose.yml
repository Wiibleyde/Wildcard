name: wildcard

# Démarrage minimal (requis) :
#   docker compose --env-file .env.docker up -d
#
# Avec Studio + Storage :
#   docker compose --env-file .env.docker --profile studio up -d

services:
  # ──────────────────────────────────────────────────────────────────────────
  # Database
  # ──────────────────────────────────────────────────────────────────────────
  db:
    container_name: supabase-db
    image: supabase/postgres:15.8.1.060
    restart: unless-stopped
    healthcheck:
      test: pg_isready -U postgres -h localhost
      interval: 5s
      timeout: 5s
      retries: 10
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - log_min_messages=fatal
    environment:
      POSTGRES_HOST: /var/run/postgresql
      PGPORT: ${POSTGRES_PORT}
      POSTGRES_PORT: ${POSTGRES_PORT}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: ${JWT_EXPIRY}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - ${POSTGRES_PORT}:${POSTGRES_PORT}

  # One-shot : applique les migrations après que la DB soit prête
  db-migrate:
    container_name: supabase-db-migrate
    image: postgres:15-alpine
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./supabase/migrations:/migrations:ro
      - ./supabase/seed.sql:/seed.sql:ro
      - ./supabase/init/zzz-fix-auth-schema.sh:/fix-auth-schema.sh:ro
    command: >
      sh -c "
        echo 'Fixing auth schema (image/gotrue version mismatch)...';
        sh /fix-auth-schema.sh;
        for f in $$(ls /migrations/*.sql 2>/dev/null | sort); do
          echo \"Applying $$f...\";
          psql -h db -U postgres -d ${POSTGRES_DB} -f $$f || true;
        done;
        psql -h db -U postgres -d ${POSTGRES_DB} -f /seed.sql || true;
        echo 'Migrations done.'
      "

  # ──────────────────────────────────────────────────────────────────────────
  # API Gateway
  # ──────────────────────────────────────────────────────────────────────────
  kong:
    container_name: supabase-kong
    image: kong:2.8.1
    restart: unless-stopped
    entrypoint: >
      bash -c 'sed "s|\$${SUPABASE_ANON_KEY}|$${SUPABASE_ANON_KEY}|g; s|\$${SUPABASE_SERVICE_KEY}|$${SUPABASE_SERVICE_KEY}|g" ~/temp.yml > ~/kong.yml && /docker-entrypoint.sh kong docker-start'
    ports:
      - ${KONG_HTTP_PORT}:8000/tcp
      - ${KONG_HTTPS_PORT}:8443/tcp
    depends_on:
      db:
        condition: service_healthy
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
    volumes:
      - ./supabase/kong.yml:/home/kong/temp.yml:ro

  # ──────────────────────────────────────────────────────────────────────────
  # Auth
  # Note: connexion en postgres (superuser) car supabase_auth_admin est un rôle
  # réservé sans mot de passe dans cette image (local dev uniquement)
  # ──────────────────────────────────────────────────────────────────────────
  auth:
    container_name: supabase-auth
    image: supabase/gotrue:v2.164.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      timeout: 5s
      interval: 5s
      retries: 5
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?search_path=auth
      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS}
      GOTRUE_DISABLE_SIGNUP: ${DISABLE_SIGNUP}
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${JWT_EXPIRY}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: ${ENABLE_EMAIL_SIGNUP}
      GOTRUE_EXTERNAL_ANONYMOUS_USERS_ENABLED: ${ENABLE_ANONYMOUS_USERS}
      GOTRUE_MAILER_AUTOCONFIRM: ${ENABLE_EMAIL_AUTOCONFIRM}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL}
      GOTRUE_SMTP_HOST: ${SMTP_HOST}
      GOTRUE_SMTP_PORT: ${SMTP_PORT}
      GOTRUE_SMTP_USER: ${SMTP_USER}
      GOTRUE_SMTP_PASS: ${SMTP_PASS}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME}
      GOTRUE_MAILER_URLPATHS_INVITE: ${MAILER_URLPATHS_INVITE}
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: ${MAILER_URLPATHS_CONFIRMATION}
      GOTRUE_MAILER_URLPATHS_RECOVERY: ${MAILER_URLPATHS_RECOVERY}
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: ${MAILER_URLPATHS_EMAIL_CHANGE}
      GOTRUE_EXTERNAL_DISCORD_ENABLED: ${ENABLE_DISCORD_SIGNUP}
      GOTRUE_EXTERNAL_DISCORD_CLIENT_ID: ${SUPABASE_AUTH_DISCORD_CLIENT_ID}
      GOTRUE_EXTERNAL_DISCORD_SECRET: ${SUPABASE_AUTH_DISCORD_SECRET}
      GOTRUE_EXTERNAL_DISCORD_REDIRECT_URI: ${API_EXTERNAL_URL}/auth/v1/callback
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: ${ENABLE_GOOGLE_SIGNUP}
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${SUPABASE_AUTH_GOOGLE_CLIENT_ID}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${SUPABASE_AUTH_GOOGLE_SECRET}
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: ${API_EXTERNAL_URL}/auth/v1/callback
      GOTRUE_EXTERNAL_APPLE_ENABLED: ${ENABLE_APPLE_SIGNUP}
      GOTRUE_EXTERNAL_APPLE_CLIENT_ID: ${SUPABASE_AUTH_APPLE_CLIENT_ID}
      GOTRUE_EXTERNAL_APPLE_SECRET: ${SUPABASE_AUTH_APPLE_SECRET}
      GOTRUE_EXTERNAL_APPLE_REDIRECT_URI: ${API_EXTERNAL_URL}/auth/v1/callback

  # ──────────────────────────────────────────────────────────────────────────
  # REST API (PostgREST)
  # ──────────────────────────────────────────────────────────────────────────
  rest:
    container_name: supabase-rest
    image: postgrest/postgrest:v12.2.3
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      PGRST_DB_SCHEMAS: ${PGRST_DB_SCHEMAS}
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: ${JWT_EXPIRY}
    command: ["postgrest"]

  # ──────────────────────────────────────────────────────────────────────────
  # Realtime
  # ──────────────────────────────────────────────────────────────────────────
  realtime:
    container_name: realtime-dev.supabase-realtime
    image: supabase/realtime:v2.76.5
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD-SHELL"
        - >
          curl -sSfL --head -o /dev/null
          -H "Authorization: Bearer ${ANON_KEY}"
          http://localhost:4000/api/tenants/realtime-dev/health
      timeout: 5s
      interval: 30s
      retries: 3
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
      # Start only after app migrations finish: they `ALTER PUBLICATION
      # supabase_realtime`, which deadlocks against the realtime tenant doing
      # the same on boot — and `_realtime` is created by the db-migrate step.
      db-migrate:
        condition: service_completed_successfully
    environment:
      PORT: 4000
      DB_HOST: ${POSTGRES_HOST}
      DB_PORT: ${POSTGRES_PORT}
      # Must be the superuser that owns the `realtime` schema, or tenant
      # migrations fail with "permission denied for schema realtime" and
      # postgres_changes never work. `postgres` is NOT superuser in the
      # supabase image; `supabase_admin` is (password set by zzz-set-role-passwords.sh).
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      METRICS_JWT_SECRET: ${JWT_SECRET}
      ERL_AFLAGS: -proto_dist inet_tcp
      DNS_NODES: "''"
      RLIMIT_NOFILE: "10000"
      APP_NAME: realtime
      SEED_SELF_HOST: "true"
      RUN_JANITOR: "true"
      DISABLE_HEALTHCHECK_LOGGING: "true"

  # ──────────────────────────────────────────────────────────────────────────
  # Local email testing
  # ──────────────────────────────────────────────────────────────────────────
  inbucket:
    container_name: supabase-inbucket
    image: inbucket/inbucket:3.0.4
    restart: unless-stopped
    ports:
      - ${INBUCKET_PORT}:9000

  # ──────────────────────────────────────────────────────────────────────────
  # Application Next.js
  # ──────────────────────────────────────────────────────────────────────────
  app:
    container_name: wildcard-app
    build:
      context: .
    restart: unless-stopped
    depends_on:
      kong:
        condition: service_healthy
      auth:
        condition: service_healthy
    # Config lue au RUNTIME (pas de --build-arg) → une image unique, paramétrée
    # ici. Les valeurs publiques sont relayées au navigateur via window.__PUBLIC_ENV__.
    environment:
      NODE_ENV: production
      SUPABASE_URL: ${API_EXTERNAL_URL}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      UMAMI_URL: ${UMAMI_URL}
      UMAMI_WEBSITE_ID: ${UMAMI_WEBSITE_ID}
    ports:
      - "3000:3000"

  # ──────────────────────────────────────────────────────────────────────────
  # Profil "studio" — optionnel, dashboard + storage
  # Lancer avec : docker compose --env-file .env.docker --profile studio up -d
  # ──────────────────────────────────────────────────────────────────────────
  meta:
    profiles: [studio]
    container_name: supabase-meta
    image: supabase/postgres-meta:v0.84.2
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: ${POSTGRES_HOST}
      PG_META_DB_PORT: ${POSTGRES_PORT}
      PG_META_DB_NAME: ${POSTGRES_DB}
      PG_META_DB_USER: postgres
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}

  storage:
    profiles: [studio]
    container_name: supabase-storage
    image: supabase/storage-api:v1.14.0
    restart: unless-stopped
    healthcheck:
      # 127.0.0.1, not localhost: the server binds IPv4 0.0.0.0 while `localhost`
      # resolves to IPv6 ::1 in this image → "connection refused". start_period
      # covers the schema-migration boot before the HTTP server listens.
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:5000/status"]
      timeout: 5s
      interval: 5s
      retries: 5
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_started
      # After app migrations: avoids racing them on the storage schema and lets
      # storage-api run its own schema migration cleanly (see storage-init).
      db-migrate:
        condition: service_completed_successfully
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: "false"
    volumes:
      - storage-data:/var/lib/storage

  # One-shot : crée le bucket avatars + RLS APRÈS que storage-api ait migré son
  # schéma. Appliquer ces policies avant rendrait storage.foldername(text)
  # indéboulonnable et bloquerait la migration storage-schema en boucle.
  storage-init:
    profiles: [studio]
    container_name: supabase-storage-init
    image: postgres:15-alpine
    restart: "no"
    depends_on:
      storage:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./supabase/init/storage-avatars.sql:/storage-avatars.sql:ro
    command: >
      sh -c "psql -h db -U postgres -d ${POSTGRES_DB} -f /storage-avatars.sql"

  studio:
    profiles: [studio]
    container_name: supabase-studio
    image: supabase/studio:20250317-6955350
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/platform/profile').then(r => process.exit(r.ok ? 0 : 1))"]
      timeout: 5s
      interval: 5s
      retries: 3
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: ${STUDIO_DEFAULT_ORGANIZATION}
      DEFAULT_PROJECT_NAME: ${STUDIO_DEFAULT_PROJECT}
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET}
      NEXT_PUBLIC_ENABLE_LOGS: "false"
    ports:
      - ${STUDIO_PORT}:3000

  # ──────────────────────────────────────────────────────────────────────────
  # Profil "monitoring" — stack analytics & observabilité (Umami + Prometheus +
  # Grafana). 100% self-host, RGPD-compliant (Umami cookieless).
  # Lancer avec : docker compose --env-file .env.docker --profile monitoring up -d
  # ──────────────────────────────────────────────────────────────────────────

  # Base Postgres dédiée à Umami — isolée de la DB Supabase pour ne pas mélanger
  # les schémas applicatifs et analytics (et garder l'ownership des données clair).
  umami-db:
    profiles: [monitoring]
    container_name: wildcard-umami-db
    image: postgres:15-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami -d umami"]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD}
    volumes:
      - umami-db-data:/var/lib/postgresql/data

  # Umami — analytics web cookieless (pages vues, sessions, événements joueurs).
  umami:
    profiles: [monitoring]
    container_name: wildcard-umami
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: unless-stopped
    depends_on:
      umami-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD}@umami-db:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET}
    ports:
      - ${UMAMI_PORT}:3000

  # Prometheus — scrape les métriques applicatives exposées sur /api/metrics.
  prometheus:
    profiles: [monitoring]
    container_name: wildcard-prometheus
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    # host.docker.internal → permet de scraper `next dev` lancé sur l'hôte
    # (profil dev, app hors compose) en plus du service `app` conteneurisé.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
    ports:
      - ${PROMETHEUS_PORT}:9090

  # Grafana — visualisation unifiée : datasource Prometheus + datasource
  # PostgreSQL (Umami). Datasources et dashboards provisionnés au démarrage.
  grafana:
    profiles: [monitoring]
    container_name: wildcard-grafana
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    depends_on:
      - prometheus
      - umami-db
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Consommée par la datasource PostgreSQL provisionnée (interpolée par Grafana).
      UMAMI_DB_PASSWORD: ${UMAMI_DB_PASSWORD}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - ${GRAFANA_PORT}:3000

volumes:
  db-data:
  storage-data:
  umami-db-data:
  prometheus-data:
  grafana-data:
